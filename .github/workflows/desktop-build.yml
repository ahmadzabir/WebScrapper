name: Build Desktop App (Windows, Mac, Linux)

permissions:
  contents: write  # needed to create releases and upload assets

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version for release (e.g. 1.0.0)"
        required: true
        default: "1.0.0"
  push:
    tags:
      - "desktop-v*"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: choco install innosetup --no-progress -y
        shell: pwsh
      - shell: pwsh
        run: |
          $v = if ("${{ github.event_name }}" -eq "workflow_dispatch") { "${{ github.event.inputs.version }}" } else { "${{ github.ref_name }}" }
          if ($v -like "desktop-v*") { $v = $v.Replace("desktop-v", "") }
          if (-not $v) { $v = "1.0.0" }
          ./desktop_app/build_windows.ps1 -Clean -Version $v
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            dist/WebScrapperDesktop-Windows.zip
            dist/WebScrapperDesktop-Setup.exe
          if-no-files-found: warn

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: chmod +x desktop_app/build_mac.sh
      - run: |
          v="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}"
          [ "${v#desktop-v}" != "$v" ] && v="${v#desktop-v}"
          [ -z "$v" ] && v="1.0.0"
          ./desktop_app/build_mac.sh "$v"
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/WebScrapperDesktop-macOS.zip
          if-no-files-found: warn

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: chmod +x desktop_app/build_linux.sh
      - run: |
          v="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}"
          [ "${v#desktop-v}" != "$v" ] && v="${v#desktop-v}"
          [ -z "$v" ] && v="1.0.0"
          ./desktop_app/build_linux.sh "$v"
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/WebScrapperDesktop-Linux.zip
          if-no-files-found: warn

  release:
    if: startsWith(github.ref, 'refs/tags/desktop-v') || github.event_name == 'workflow_dispatch'
    needs: [build-windows, build-mac, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('desktop-v{0}', github.event.inputs.version) || github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/windows/WebScrapperDesktop-Windows.zip
            artifacts/windows/WebScrapperDesktop-Setup.exe
            artifacts/macos/WebScrapperDesktop-macOS.zip
            artifacts/linux/WebScrapperDesktop-Linux.zip
